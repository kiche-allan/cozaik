# Deployment Configuration: eval_pred (PRED Pipeline) - HETEROGENEOUS
#
# Component-based device allocation:
#   SQs declare required components via TTConstraint(components=[...])
#   Devices declare available components below
#   The mapper matches SQs to devices that satisfy all required components
#
# Placement flexibility:
#   - "storage" + "mqtt_broker" SQs → device_d, device_e (2 options)
#   - "sensor_interface" SQs → device_a, device_b (2 options)
#   - "compute" SQs → device_b, device_c, device_d, device_e (4 options)
#   - "mqtt_broker" SQs → device_d, device_e (2 options)
#   - Unconstrained SQs → all devices (5 options)
#
# PRED has two input paths:
#   Path 1: Model updates (mqtt_subscribe → blob_download) from storage
#   Path 2: Sensor data (pred_data_spout → senml_parse) from sensors
# Then three parallel prediction branches merge into error estimation.

application:
  name: eval_pred
  description: "RIoTBench PRED pipeline - heterogeneous cluster"

devices:
  - id: device_a
    type: raspberry_pi_3
    location: sensor_node
    components:
      sensor_interface: true

  - id: device_b
    type: raspberry_pi_4
    location: edge_site_0
    components:
      sensor_interface: true
      compute: true

  - id: device_c
    type: jetson_nano
    location: edge_site_1
    components:
      compute: true

  - id: device_d
    type: intel_nuc_i5
    location: fog_site
    components:
      compute: true
      storage: true
      mqtt_broker: true

  - id: device_e
    type: server_x86
    location: datacenter
    components:
      compute: true
      storage: true
      mqtt_broker: true

network:
  - link: [device_a, device_b]
    type: wifi_good
  - link: [device_a, device_c]
    type: wifi_good
  - link: [device_b, device_c]
    type: ethernet_1g
  - link: [device_b, device_d]
    type: ethernet_1g
  - link: [device_c, device_d]
    type: ethernet_1g
  - link: [device_d, device_e]
    type: ethernet_1g
  - link: [device_a, device_e]
    type: internet_local
  - link: [device_b, device_e]
    type: internet_local
  - link: [device_c, device_e]
    type: internet_local
