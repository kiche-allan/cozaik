# Deployment configuration for 4-CAV evaluation
# Homogeneous: All CAVs use Jetson Nano, RSU uses server

application:
  name: eval_4cav_fusion
  description: "4-CAV sensor fusion evaluation workload"

devices:
  - id: cav0
    type: jetson_nano
    location: vehicle_0
    components:
      camera: true
      lidar: true

  - id: cav1
    type: jetson_nano
    location: vehicle_1
    components:
      camera: true
      lidar: true

  - id: cav2
    type: jetson_nano
    location: vehicle_2
    components:
      camera: true
      lidar: true

  - id: cav3
    type: jetson_nano
    location: vehicle_3
    components:
      camera: true
      lidar: true

  - id: rsu
    type: server_x86
    location: roadside
    components:
      display: true

network:
  - link: [cav0, rsu]
    type: dsrc_v2i
  - link: [cav1, rsu]
    type: dsrc_v2i
  - link: [cav2, rsu]
    type: dsrc_v2i
  - link: [cav3, rsu]
    type: dsrc_v2i
  - link: [cav0, cav1]
    type: dsrc_v2v
  - link: [cav1, cav2]
    type: dsrc_v2v
  - link: [cav2, cav3]
    type: dsrc_v2v
  - link: [cav0, cav2]
    type: dsrc_v2v
  - link: [cav1, cav3]
    type: dsrc_v2v
  - link: [cav0, cav3]
    type: dsrc_v2v