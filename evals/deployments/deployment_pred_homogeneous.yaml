# Deployment Configuration: eval_pred (PRED Pipeline) - HOMOGENEOUS
#
# All devices are intel_nuc_i5 — uniform hardware. QPF optimizes
# purely for communication cost and load balancing.
#
# Placement flexibility:
#   - "storage" + "mqtt_broker" SQs → device_d, device_e (2 options)
#   - "sensor_interface" SQs → device_a, device_b (2 options)
#   - "compute" SQs → device_b, device_c, device_d, device_e (4 options)
#   - "mqtt_broker" SQs → device_d, device_e (2 options)
#   - Unconstrained SQs → all devices (5 options)

application:
  name: eval_pred
  description: "RIoTBench PRED pipeline - homogeneous cluster"

devices:
  - id: device_a
    type: intel_nuc_i5
    location: sensor_node
    components:
      sensor_interface: true

  - id: device_b
    type: intel_nuc_i5
    location: edge_site_0
    components:
      sensor_interface: true
      compute: true

  - id: device_c
    type: intel_nuc_i5
    location: edge_site_1
    components:
      compute: true

  - id: device_d
    type: intel_nuc_i5
    location: fog_site
    components:
      compute: true
      storage: true
      mqtt_broker: true

  - id: device_e
    type: intel_nuc_i5
    location: datacenter
    components:
      compute: true
      storage: true
      mqtt_broker: true

network:
  - link: [device_a, device_b]
    type: ethernet_1g
  - link: [device_a, device_c]
    type: ethernet_1g
  - link: [device_b, device_c]
    type: ethernet_1g
  - link: [device_b, device_d]
    type: ethernet_1g
  - link: [device_c, device_d]
    type: ethernet_1g
  - link: [device_d, device_e]
    type: ethernet_1g
  - link: [device_a, device_e]
    type: ethernet_1g
  - link: [device_b, device_e]
    type: ethernet_1g
  - link: [device_c, device_e]
    type: ethernet_1g
